<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>PaintJS</title>
  </head>
  <body>
    <canvas id="jsCanvas" class="canvas"></canvas>
    <span id="jsState" class="state">painting...</span>
    <div class="controls">
      <div class="controls__range">
        <input type="range" id="jsRange" min="1" max="20" step="1" value="1" />
      </div>
      <div class="controls__btns">
        <button id="jsMode">fill</button>
        <button id="jsSave">save</button>
        <button id="jsAllClear">all clear</button>
      </div>
      <div id="jsColors" class="controls__colors">
        <div
          class="controls__color jsColor"
          style="background-color: #e74c3c"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #e67e22"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #f1c40f"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #2ecc71"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #3498db"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #30336b"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #9b59b6"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: #1e272e"
        ></div>
        <div
          class="controls__color jsColor"
          style="background-color: white"
        ></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
